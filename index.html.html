<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Music Player</title>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.player{
background:#181818;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.cover{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

.title{
font-size:20px;
font-weight:bold;
}

.artist{
color:#b3b3b3;
margin-bottom:20px;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
margin:15px 0;
}

button{
background:#1db954;
border:none;
color:white;
font-size:18px;
width:50px;
height:50px;
border-radius:50%;
cursor:pointer;
}

.progress{
width:100%;
margin:10px 0;
}

input[type=range]{
width:100%;
}

</style>
</head>

<body>

<div class="player">

<img src="Olharfogo.jpeg" class="cover">

<div class="title">Um Olhar</div>
<div class="artist">Feliz dia da Mulher!</div>

<audio id="audio">
<source src="Umolhar.mp3"audio/mpeg">
</audio>

<div class="controls">
<button onclick="playPause()">▶</button>
</div>

<div class="progress">
<input type="range" id="progress" value="0">
</div>

</div>

<script>

const audio = document.getElementById("audio")
const progress = document.getElementById("progress")

function playPause(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

audio.addEventListener("timeupdate", function(){

progress.value = (audio.currentTime / audio.duration) * 100

})

progress.addEventListener("input", function(){

audio.currentTime = (progress.value / 100) * audio.duration

})

</script>

</body>
</html>
